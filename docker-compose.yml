services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: techmove-sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TechMove_Pass123!"
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TechMove_Pass123! -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  techmove-backend-api:
    build:
      context: .
      dockerfile: TechMove.Api/Dockerfile
    container_name: techmove-backend-api
    depends_on:
      sql-server-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=TechMoveDB;User Id=sa;Password=TechMove_Pass123!;TrustServerCertificate=True;"
    ports:
      - "5001:8080"

  techmove-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techmove-frontend-web
    depends_on:
      - techmove-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApiBaseUrl: "http://techmove-backend-api:8080/"
    ports:
      - "5000:8080"

volumes:
  sql-server-data:
